<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Cards — Изучение английского</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <nav id="main-nav" style="display: none;">
            <div class="nav-brand">English Cards</div>
            <div class="nav-links">
                <a href="#dashboard" data-route="dashboard"><i class="fas fa-book-open"></i> Обучение</a>
                <a href="#catalog" data-route="catalog"><i class="fas fa-layer-group"></i> Каталог</a>
                <a href="#dictionary" data-route="dictionary"><i class="fas fa-list-ul"></i> Словарь</a>
                <a href="#stats" data-route="stats"><i class="fas fa-chart-bar"></i> Статистика</a>
                <button id="btn-logout" class="btn-link"><i class="fas fa-sign-out-alt"></i> Выйти</button>
            </div>
        </nav>
        <main id="screen-container"></main>
    </div>

    <div id="modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script type="module" src="/js/app.js"></script>
</body>
</html>
